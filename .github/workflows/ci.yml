# iodesystems shared CI gate (canon X-CI-1): lint -> test -> build.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      # Build the embedded SPA so //go:embed all:dist resolves on a clean
      # checkout (ui/dist is gitignored). Also gates the UI build itself.
      - name: build ui
        working-directory: ui
        run: |
          npm ci
          npm run build
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint run ./...
      - name: test
        run: go test ./...
      - name: build
        run: go build ./...
